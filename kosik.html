<div class="sunmoon">
<img id="icon" src="images/moon.svg" height="50px" width="50px" top="50px" onclick="toggleDarkMode()">
</div>
<script>
  function toggleDarkMode() {
    const icon = document.getElementById("icon");
  
    document.body.classList.toggle("dark");
  
    if (document.body.classList.contains("dark")) {
      localStorage.setItem("mode", "dark");
      icon.src = "images/sun.svg";
    } else {
      localStorage.setItem("mode", "light");
      icon.src = "images/moon.svg";
    }
  }
  
  
  window.onload = function () {
    const icon = document.getElementById("icon");
  
    if (localStorage.getItem("mode") === "dark") {
      document.body.classList.add("dark");
      icon.src = "images/sun.svg";
    } else {
      icon.src = "images/moon.svg";
    }
  }
  </script>
</header>
</section>
<p class="gnadpis">
  SHOPPING CART
</p>

<section class="moje-sekce2">
<div class="items-container">
<p class="items-header">ITEMS</p>

<!-- Cart will be populated from localStorage -->
</div>
</section>

<section class="price-summary">
  <div class="summary-content">
    <p class="summary-label">SUBTOTAL</p>
    <p class="summary-price">0 &euro;</p>
  </div>
</section>

<section class="checkout-section">
  <div class="email-container">
    <input type="email" class="email-input" placeholder="Enter your email..." required>
  </div>
  <button class="checkout">CHECKOUT</button>
</section>

<script>
<script>
const euro = String.fromCharCode(8364);

function loadCart() {
  const cart = JSON.parse(localStorage.getItem('cart')) || [];
  const itemsContainer = document.querySelector('.items-container');
  itemsContainer.querySelectorAll('.item-row').forEach((row) => row.remove());

  if (!cart.length) {
    itemsContainer.innerHTML += '<p style="text-align:center;padding:40px;font-size:20px">Your cart is empty</p>';
    document.querySelector('.summary-price').textContent = '0 ' + euro;
    return;
  }

  cart.forEach((product) => {
    const row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML = `<div class="item-image"><img src="${product.image}" alt="Product"></div><section class="itemcart"><a>${product.name}</a><p class="item-price">${product.price} ${euro}</p></section><div class="quantity-control"><button class="qty-btn" onclick="decQty(this)">-</button><input type="number" class="qty-input" value="${product.quantity}" min="1" max="999" onchange="updCart(this);updPrices()"><button class="qty-btn" onclick="incQty(this);updCart(this);updPrices()">+</button></div><div class="item-total"><p class="total-price">${product.price * product.quantity} ${euro}</p></div><button class="bin-button" onclick="remItem(this)"><img src="images/trash.svg" class="binb" alt="Remove"></button>`;
    itemsContainer.appendChild(row);
  });

  updPrices();
}

function updCart(input) {
  const row = input.closest('.item-row');
  const quantity = parseInt(input.value, 10);
  const cart = JSON.parse(localStorage.getItem('cart')) || [];
  const productName = row.querySelector('.itemcart a').textContent;
  const cartItem = cart.find((item) => item.name === productName);

  if (cartItem) {
    cartItem.quantity = quantity;
    localStorage.setItem('cart', JSON.stringify(cart));
  }
}

function remItem(button) {
  const row = button.closest('.item-row');
  const productName = row.querySelector('.itemcart a').textContent;
  let cart = JSON.parse(localStorage.getItem('cart')) || [];

  cart = cart.filter((item) => item.name !== productName);
  localStorage.setItem('cart', JSON.stringify(cart));

  row.style.opacity = '0';
  row.style.transform = 'scale(0.8)';

  setTimeout(() => {
    row.remove();
    updPrices();
    loadCart();
  }, 300);
}

function incQty(button) {
  const input = button.previousElementSibling;
  input.value = parseInt(input.value, 10) + 1;
  updPrices();
}

function decQty(button) {
  const input = button.nextElementSibling;

  if (parseInt(input.value, 10) <= 1) {
    remItem(button.closest('.item-row').querySelector('.bin-button'));
    return;
  }

  input.value = parseInt(input.value, 10) - 1;
  updCart(input);
  updPrices();
}

function updPrices() {
  let total = 0;

  document.querySelectorAll('.item-row').forEach((row) => {
    const price = parseInt(row.querySelector('.item-price').textContent, 10);
    const quantity = parseInt(row.querySelector('.qty-input').value, 10);
    const itemTotal = price * quantity;

    row.querySelector('.total-price').textContent = itemTotal + ' ' + euro;
    total += itemTotal;
  });

  document.querySelector('.summary-price').textContent = total + ' ' + euro;
}

window.addEventListener('load', loadCart);
</script>
