<img id="icon" src="images/moon.svg" height="50px" width="50px" top="50px" onclick="toggleDarkMode()">
</div>
<script>
  function toggleDarkMode() {
    const icon = document.getElementById("icon");
  
    document.body.classList.toggle("dark");
  
    if (document.body.classList.contains("dark")) {
      localStorage.setItem("mode", "dark");
      icon.src = "images/sun.svg";
    } else {
      localStorage.setItem("mode", "light");
      icon.src = "images/moon.svg";
    }
  }
  
  
  window.onload = function () {
    const icon = document.getElementById("icon");
  
    if (localStorage.getItem("mode") === "dark") {
      document.body.classList.add("dark");
      icon.src = "images/sun.svg";
    } else {
      icon.src = "images/moon.svg";
    }
  }
  </script>

<p class="gnadpis">
  SHOPPING CART
</p>

<section class="moje-sekce2">

<p class="items-header">ITEMS</p>

<!-- Cart will be populated from localStorage -->

<section class="price-summary">

    <input type="email" class="email-input" placeholder="Enter your email..." required>
  </div>

</section>

<script>
function loadCart(){const c=JSON.parse(localStorage.getItem('cart'))||[],ic=document.querySelector('.items-container');ic.querySelectorAll('.item-row').forEach(x=>x.remove());if(!c.length){ic.innerHTML+='<p style="text-align:center;padding:40px;font-size:20px">Your cart is empty</p>';document.querySelector('.summary-price').textContent='0 €';return;}c.forEach(p=>{const r=document.createElement('div');r.className='item-row';r.innerHTML=`<div class="item-image"><img src="${p.image}" alt="Product"></div><section class="itemcart"><a>${p.name}</a><p class="item-price">${p.price} €</p></section><div class="quantity-control"><button class="qty-btn" onclick="decQty(this)">−</button><input type="number" class="qty-input" value="${p.quantity}" min="1" max="999" onchange="updCart(this);updPrices()"><button class="qty-btn" onclick="incQty(this);updCart(this);updPrices()">+</button></div><div class="item-total"><p class="total-price">${p.price*p.quantity} €</p></div><button class="bin-button" onclick="remItem(this)"><img src="images/trash.svg" class="binb" alt="Remove"></button>`;ic.appendChild(r);});updPrices();}function updCart(inp){const r=inp.closest('.item-row'),pc=parseInt(r.querySelector('.item-price').textContent),q=parseInt(inp.value),c=JSON.parse(localStorage.getItem('cart'))||[],pn=r.querySelector('.itemcart a').textContent,ci=c.find(x=>x.name===pn);if(ci){ci.quantity=q;localStorage.setItem('cart',JSON.stringify(c));}}function remItem(btn){const r=btn.closest('.item-row'),pn=r.querySelector('.itemcart a').textContent;let c=JSON.parse(localStorage.getItem('cart'))||[];c=c.filter(x=>x.name!==pn);localStorage.setItem('cart',JSON.stringify(c));r.style.opacity='0';r.style.transform='scale(0.8)';setTimeout(()=>{r.remove();updPrices();loadCart();},300);}function incQty(btn){const inp=btn.previousElementSibling;inp.value=parseInt(inp.value)+1;updPrices();}function decQty(btn){const inp=btn.nextElementSibling;if(parseInt(inp.value)>1)inp.value=parseInt(inp.value)-1;updPrices();}function updPrices(){let t=0;document.querySelectorAll('.item-row').forEach(r=>{const pc=parseInt(r.querySelector('.item-price').textContent),q=parseInt(r.querySelector('.qty-input').value),it=pc*q;r.querySelector('.total-price').textContent=it+' €';t+=it;});document.querySelector('.summary-price').textContent=t+' €';}window.addEventListener('load',loadCart);
</script>
