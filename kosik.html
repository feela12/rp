<div class="sunmoon">
<img id="icon" src="images/moon.svg" height="50px" width="50px" top="50px" onclick="toggleDarkMode()">
</div>
<script>
  function toggleDarkMode() {
    const icon = document.getElementById("icon");
  
    document.body.classList.toggle("dark");
  
    if (document.body.classList.contains("dark")) {
      localStorage.setItem("mode", "dark");
      icon.src = "images/sun.svg";
    } else {
      localStorage.setItem("mode", "light");
      icon.src = "images/moon.svg";
    }
  }
  
  
  window.onload = function () {
    const icon = document.getElementById("icon");
  
    if (localStorage.getItem("mode") === "dark") {
      document.body.classList.add("dark");
      icon.src = "images/sun.svg";
    } else {
      icon.src = "images/moon.svg";
    }
  }
  </script>
</header>
</section>
<p class="gnadpis">
  SHOPPING CART
</p>

<section class="moje-sekce2">
<div class="items-container">
<p class="items-header">ITEMS</p>

<!-- Cart will be populated from localStorage -->
</div>

<section class="price-summary">

<section class="cart-recommendations">
  <div class="recommendations-header">
    <p class="recommendations-kicker">OFTEN BOUGHT TOGETHER</p>
    <h2>COMPLETE THE LOOK</h2>
  </div>
  <div class="recommendations-grid"></div>
</section>

<script>
const euro = String.fromCharCode(8364);
const productCatalog = [
  { name: 'A GREAT CHAOS CHAIN - REPLICA', price: 800, image: 'images/3chaos.png', url: 'product1.html' },
  { name: 'RICK OWENS SS20 BRUTALIST CHAIN', price: 1200, image: 'images/chain1.jpeg', url: 'product2.html' },
  { name: 'RICK OWENS DRKSHDW', price: 2500, image: 'images/DRK.png', url: 'product3.html' },
  { name: 'MAISON MARGIELA FUTURE', price: 999, image: 'images/futures.jpg', url: 'product4.html' },
  { name: 'YZY WET TANK TOP', price: 20, image: 'images/yeezywet1.png', url: 'product5.html' },
  { name: 'XO PENDANT - THE WEEKND REPLICA', price: 500, image: 'images/XOprod.png', url: 'product6.html' }
];

const productUrlMap = Object.fromEntries(productCatalog.map((product) => [product.name, product.url]));

function getCart() {
  return JSON.parse(localStorage.getItem('cart')) || [];
}

function saveCart(cart) {
  localStorage.setItem('cart', JSON.stringify(cart));
}

function getProductUrl(product) {
  return product.url || productUrlMap[product.name] || '#';
}

function loadCart() {
  const cart = getCart();
  const itemsContainer = document.querySelector('.items-container');
  const emptyMessage = itemsContainer.querySelector('.cart-empty-message');

  itemsContainer.querySelectorAll('.item-row').forEach((row) => row.remove());
  if (emptyMessage) {
    emptyMessage.remove();
  }

  if (!cart.length) {
    itemsContainer.insertAdjacentHTML('beforeend', '<p class="cart-empty-message" style="text-align:center;padding:40px;font-size:20px">Your cart is empty</p>');
    document.querySelector('.summary-price').textContent = '0 ' + euro;
    renderRecommendations(cart);
    return;
  }

  cart.forEach((product) => {
    const price = Number(product.price) || 0;
    const quantity = Number(product.quantity) || 1;
    const productUrl = getProductUrl(product);
    const row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML = `<div class="item-image"><img src="${product.image}" alt="Product"></div><section class="itemcart"><a class="cart-product-link" href="${productUrl}">${product.name}</a><p class="item-price">${price} ${euro}</p></section><div class="quantity-control"><button class="qty-btn" onclick="decQty(this)">-</button><input type="number" class="qty-input" value="${quantity}" min="1" max="999" onchange="updCart(this);updPrices()"><button class="qty-btn" onclick="incQty(this);updCart(this);updPrices()">+</button></div><div class="item-total"><p class="total-price">${price * quantity} ${euro}</p></div><button class="bin-button" onclick="remItem(this)"><img src="images/trash.svg" class="binb" alt="Remove"></button>`;
    itemsContainer.appendChild(row);
  });

  updPrices();
  renderRecommendations(cart);
}

function updCart(input) {
  const row = input.closest('.item-row');
  const quantity = parseInt(input.value, 10);
  const cart = getCart();
  const productName = row.querySelector('.itemcart a').textContent;
  const cartItem = cart.find((item) => item.name === productName);

  if (cartItem) {
    cartItem.quantity = Math.max(1, quantity);
    saveCart(cart);
  }
}

function remItem(button) {
  const row = button.closest('.item-row');
  const productName = row.querySelector('.itemcart a').textContent;
  let cart = getCart();

  cart = cart.filter((item) => item.name !== productName);
  saveCart(cart);

  row.style.opacity = '0';
  row.style.transform = 'scale(0.8)';

  setTimeout(() => {
    row.remove();
    updPrices();
    loadCart();
  }, 300);
}

function incQty(button) {
  const input = button.previousElementSibling;
  input.value = parseInt(input.value, 10) + 1;
  updPrices();
}

function decQty(button) {
  const input = button.nextElementSibling;

  if (parseInt(input.value, 10) <= 1) {
    remItem(button.closest('.item-row').querySelector('.bin-button'));
    return;
  }

  input.value = parseInt(input.value, 10) - 1;
  updCart(input);
  updPrices();
}

function updPrices() {
  let total = 0;

  document.querySelectorAll('.item-row').forEach((row) => {
    const price = parseInt(row.querySelector('.item-price').textContent, 10);
    const quantity = parseInt(row.querySelector('.qty-input').value, 10);
    const itemTotal = price * quantity;

    row.querySelector('.total-price').textContent = itemTotal + ' ' + euro;
    total += itemTotal;
  });

  document.querySelector('.summary-price').textContent = total + ' ' + euro;
}

function addRecommendedToCart(productName) {
  const product = productCatalog.find((item) => item.name === productName);
  if (!product) {
    return;
  }

  const cart = getCart();
  const existing = cart.find((item) => item.name === product.name);

  if (existing) {
    existing.quantity += 1;
  } else {
    cart.push({
      name: product.name,
      price: product.price,
      image: product.image,
      url: product.url,
      quantity: 1
    });
  }

  saveCart(cart);
  loadCart();
}

function renderRecommendations(cart) {
  const container = document.querySelector('.recommendations-grid');
  if (!container) {
    return;
  }

  const inCart = new Set(cart.map((item) => item.name));
  const recommendations = productCatalog.filter((product) => !inCart.has(product.name)).slice(0, 3);

  if (!recommendations.length) {
    container.innerHTML = '<p class="recommendations-empty">You already have our top picks in your cart.</p>';
    return;
  }

  container.innerHTML = recommendations.map((product) => `
    <article class="recommendation-card">
      <a class="recommendation-image-link" href="${product.url}">
        <img src="${product.image}" alt="${product.name}">
      </a>
      <div class="recommendation-copy">
        <a class="recommendation-title" href="${product.url}">${product.name}</a>
        <p class="recommendation-price">${product.price} ${euro}</p>
      </div>
      <button class="recommendation-btn" type="button" onclick="addRecommendedToCart('${product.name.replace(/'/g, "\\'")}')">ADD TO CART</button>
    </article>
  `).join('');
}

window.addEventListener('load', loadCart);
</script>
