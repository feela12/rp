<script>
  function toggleDarkMode() {
    const icon = document.getElementById("icon");
  
    document.body.classList.toggle("dark");
  
    if (document.body.classList.contains("dark")) {
      localStorage.setItem("mode", "dark");
      icon.src = "images/sun.svg";
    } else {
      localStorage.setItem("mode", "light");
      icon.src = "images/moon.svg";
    }
  }
  
  
  window.onload = function () {
    const icon = document.getElementById("icon");
  
    if (localStorage.getItem("mode") === "dark") {
      document.body.classList.add("dark");
      icon.src = "images/sun.svg";
    } else {
      icon.src = "images/moon.svg";
    }
  }
  </script>

<script>
function removeItem(button) {
  // smazani polozky z kosiku
  const itemRow = button.closest('.item-row');
  if (itemRow) {
    itemRow.style.opacity = '0';
    itemRow.style.transform = 'scale(0.8)';
    setTimeout(() => {
      itemRow.remove();
      updatePrices();
    }, 300);
  }
}

function increaseQty(button) {
  const input = button.previousElementSibling;
  input.value = parseInt(input.value) + 1;
  updatePrices();
}

function decreaseQty(button) {
  const input = button.nextElementSibling;
  if (parseInt(input.value) > 1) {
    input.value = parseInt(input.value) - 1;
  }
  updatePrices();
}

function updatePrices() {
  let totalPrice = 0;
  
  // Všechny řady s produkty
  const itemRows = document.querySelectorAll('.item-row');
  
  itemRows.forEach(row => {
    // Získáme cenu z textu
    const priceText = row.querySelector('.item-price').textContent;
    const price = parseFloat(priceText.replace('$', ''));
    
    // Získáme kvantitu
    const quantity = parseInt(row.querySelector('.qty-input').value);
    
    // Vypočítáme cenu za produkt
    const itemTotal = price * quantity;
    
    // Aktualizujeme celkovou cenu v řádku
    row.querySelector('.total-price').textContent = '$' + itemTotal.toFixed(2);
    
    // Přidáme k celkové ceně
    totalPrice += itemTotal;
  });
  
  // Aktualizujeme shrnutí
  const summaryPrice = document.querySelector('.summary-price');
  if (summaryPrice) {
    summaryPrice.textContent = '$' + totalPrice.toFixed(2);
  }
}

// Inicializace při načtení
window.addEventListener('load', updatePrices);
</script>
