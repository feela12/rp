<!DOCTYPE html>
<html>
<head>
<style>
.search-wrapper {
  position: fixed;
  right: 250px;
  top: 82px;
  display: flex;
  align-items: center;
}

/* input je na začátku schovaný */
.search-input {
  width: 0;
  opacity: 0;
  padding: 10px;
  border: 1px solid black;
  transition: all 0.4s ease;
}

/* ikona */
.search-icon {
  cursor: pointer;
  transition: 0.4s ease;
}

/* po kliknutí */
.search-wrapper.move .search-input {
  width: 200px;
  opacity: 1;
  margin-right: 10px;
}

.search-wrapper.move .search-icon {
  transform: rotate(360deg);
}
</style>
</head>
<body>

<div class="search-wrapper" id="mysearch">
  <input type="text" class="search-input" placeholder="Hledat...">
  <div class="search-icon">
    <img src="images/search.png" width="50" height="50">
  </div>
</div>

<script>
const wrapper = document.getElementById("mysearch");
const input = document.querySelector(".search-input");

wrapper.addEventListener("click", function() {
  wrapper.classList.toggle("move");

  
});
</script>

</body>
</html>
